<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SKARION HLD 001 — WGS84 Basemap Check</title>
  <script src="https://unpkg.com/maplibre-gl@5.4.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@5.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; }
    #map { position: absolute; inset: 0; }
    #legend { position: absolute; top: 10px; left: 10px; z-index: 1; background: rgba(0,0,0,.75);
      color: #fff; font: 12px sans-serif; padding: 10px 14px; border-radius: 8px; }
    .sw { display: inline-block; width: 18px; height: 3px; margin-right: 6px; vertical-align: middle; }
  </style>
</head>
<body>
<div id="legend">
  <b>SKARION HLD 001 — WGS84</b><br/>
  <span class="sw" style="background:#facc15"></span>EOP<br/>
  <span class="sw" style="background:#f97316"></span>CL<br/>
  <span class="sw" style="background:#ef4444"></span>RW<br/>
  <span class="sw" style="background:#22d3ee"></span>PARCEL<br/>
  <span class="sw" style="background:#a855f7"></span>BOUNDARY
</div>
<div id="map"></div>
<script>
const COLORS = { EOP: "#facc15", CL: "#f97316", RW: "#ef4444", PARCEL: "#22d3ee", BOUNDARY: "#a855f7" };
const map = new maplibregl.Map({
  container: "map",
  // Self-contained style (no external tile hosts) — geometry check only.
  // Swap in a satellite raster source when viewing outside a restricted pane.
  style: {
    version: 8,
    sources: {},
    layers: [{ id: "bg", type: "background", paint: { "background-color": "#1a1a1a" } }]
  },
  center: [-97.8055, 30.4511],
  zoom: 15
});
window.__map = map;
map.once("idle", addData);
async function addData() {
  const gj = await (await fetch("skarion_hld_001_basemap_wgs84.geojson")).json();
  map.addSource("basemap", { type: "geojson", data: gj });
  for (const [layer, color] of Object.entries(COLORS)) {
    map.addLayer({
      id: "l_" + layer, type: "line", source: "basemap",
      filter: ["==", ["get", "layer"], layer],
      paint: { "line-color": color, "line-width": layer === "BOUNDARY" ? 3 : 1.5 }
    });
  }
  const b = new maplibregl.LngLatBounds();
  gj.features.forEach(f => f.geometry.coordinates.forEach(c => b.extend(c)));
  map.fitBounds(b, { padding: 40 });
  window.__loaded = { features: gj.features.length, bounds: b.toArray() };
}
</script>
</body>
</html>
