name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --reporter verbose

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  migration-smoke:
    runs-on: ubuntu-latest
    services:
      postgis:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skarion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx drizzle-kit push
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/skarion_test
      - run: npx drizzle-kit push
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/skarion_test
  # Confirm idempotent — second push should exit clean

  no-empty-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          for c in $(git log --format=%h origin/${{ github.base_ref || 'main' }}..HEAD 2>/dev/null || git log --format=%h HEAD~${{ github.event.commits.length || 0 }}..HEAD); do
            n=$(git diff-tree --no-commit-id --name-only -r $c | wc -l)
            if [ "$n" -eq 0 ]; then echo "EMPTY COMMIT: $c"; exit 1; fi
          done
        name: Reject empty commits

  test-floor-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --reporter verbose
      - run: |
          FLOOR=$(cat tests/.test-floor)
          COUNT=$(npm test -- --run 2>&1 | grep -oP 'Tests\s+\d+ passed' | grep -oP '\d+')
          if [ "$COUNT" -lt "$FLOOR" ]; then echo "Test count $COUNT below floor $FLOOR"; exit 1; fi

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:e2e
        env:
          JWT_SECRET: test-secret-at-least-32-characters-long-for-vitest
