name: CI

on:
  push:
    branches: [master, "feat/**"]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:unit

      - run: npm run build

      - name: Playwright smoke
        run: npx playwright test --project=chromium
